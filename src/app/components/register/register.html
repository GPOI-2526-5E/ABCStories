<div class="container-fluid vh-100 p-0">
  <div class="row g-0 h-100">

    <!-- Colonna sinistra  -->
    <div class="col-md-6 d-flex justify-content-center align-items-start animate-left col-scrollable"
      style="height: 100vh; overflow-y: auto;">
      <div class="w-75" style="max-width: 500px; padding: 2rem 0;">
        <div class="d-flex justify-content-center align-items-center mb-4 logo-wrapper mt-5">
          <a [routerLink]="['/']">
            <img src="assets/Loghi/Logo2.png" alt="Logo" height="60px" id="logo" class="me-3 logo" />
          </a>
        </div>
        <div class="text-center title-wrapper animate-left">
          <h1 class="title">Crea un nuovo account</h1>
        </div>
        <p class="text-center mb-5">
          Entra a far parte della nostra famiglia. Milioni di storie e utenti ti stanno aspettando.
        </p>

        <form class="w-100 form-wrapper" (ngSubmit)="onRegister($event)" novalidate>

          <!-- Sezione Email -->
          <div class="mb-3">
            <div class="inputGroup" [class.verified]="isEmailVerified" [class.has-value]="email && email.length > 0" [class.readonly]="isCodeSent || isEmailVerified">
              <input type="text" autocomplete="off" id="email" name="email" [(ngModel)]="email" [readonly]="isCodeSent || isEmailVerified" required>
              <label for="email">{{ isEmailVerified ? 'Email Verificata' : 'Inserisci la tua email' }}</label>
              <span *ngIf="isEmailVerified" class="verified-checkmark">✓</span>
            </div>
            <div *ngIf="errors['email']" class="text-danger small mt-1 ps-1 animate-fade-in">{{ errors['email'] }}</div>
            <div *ngIf="isCodeSent && !isEmailVerified" class="text-end mt-1">
              <a href="javascript:void(0)" (click)="modifyEmail()" class="small text-muted animated-underline">Modifica email</a>
            </div>
          </div>

          <!-- Pulsante Invia Codice (mostrato solo inizialmente) -->
          <div *ngIf="!isCodeSent && !isEmailVerified" class="mb-4">
            <button class="btnCont5 w-100 submit-btn" type="button" (click)="sendCode()" [disabled]="isSendingCode">
              {{ isSendingCode ? 'Invio in corso...' : 'Invia Codice di Verifica' }}
            </button>
          </div>

          <!-- Sezione Inserimento Codice -->
          <div *ngIf="isCodeSent && !isEmailVerified" class="mb-4 verification-code-section">
            <div class="mb-3">
              <div class="inputGroup" [class.has-value]="verificationCode && verificationCode.length > 0">
                <input type="text" autocomplete="off" id="verification-code" name="verificationCode" [(ngModel)]="verificationCode" required maxlength="6">
                <label for="verification-code">Codice a 6 cifre</label>
              </div>
              <div *ngIf="errors['code']" class="text-danger small mt-1 ps-1 animate-fade-in">{{ errors['code'] }}</div>
            </div>

            <div class="d-flex gap-2">
              <button class="btnCont5 w-50" type="button" (click)="verifyCode()" [disabled]="isVerifyingCode">
                {{ isVerifyingCode ? 'Verifica...' : 'Verifica Codice' }}
              </button>
              <button class="btnCont3 w-50" type="button" (click)="sendCode()" [disabled]="resendCountdown > 0 || isSendingCode">
                {{ resendCountdown > 0 ? 'Rimanda (' + resendCountdown + 's)' : 'Rimanda Codice' }}
              </button>
            </div>
          </div>

          <!-- Campi di registrazione aggiuntivi (mostrati dopo la verifica dell'email) -->
          <div *ngIf="isEmailVerified" class="reveal-fields-container">
            <div class="mb-3 reveal-field">
              <div class="inputGroup" [class.has-value]="username && username.length > 0">
                <input type="text" required autocomplete="off" id="username" name="username" [(ngModel)]="username">
                <label for="username">Inserisci il tuo nome utente</label>
              </div>
              <div *ngIf="errors['username']" class="text-danger small mt-1 ps-1 animate-fade-in">{{ errors['username'] }}</div>
            </div>

            <div class="mb-3 reveal-field">
              <div class="inputGroup" [class.has-value]="password && password.length > 0">
                <input type="password" required autocomplete="off" id="password" name="password" [(ngModel)]="password">
                <label for="password">Inserisci una password</label>
              </div>
              <div *ngIf="errors['password']" class="text-danger small mt-1 ps-1 animate-fade-in">{{ errors['password'] }}</div>
            </div>

            <div class="mb-3 reveal-field">
              <div class="inputGroup" [class.has-value]="confirmPassword && confirmPassword.length > 0">
                <input type="password" required autocomplete="off" id="confirm-password" name="confirmPassword" [(ngModel)]="confirmPassword">
                <label for="confirm-password">Ripeti la password</label>
              </div>
              <div *ngIf="errors['confirmPassword']" class="text-danger small mt-1 ps-1 animate-fade-in">{{ errors['confirmPassword'] }}</div>
            </div>

            <button class="btnCont5 mt-3 w-100 submit-btn reveal-field" type="submit">Registrati</button>
          </div>

          <!-- Google login (nascosto dopo che l'email è verificata) -->
          <div *ngIf="!isEmailVerified" class="google-section">
            <div class="divisore">
              <span></span>
              <span>or</span>
              <span></span>
            </div>

            <button class="btnCont3 w-100 d-flex align-items-center justify-content-center google-btn" type="button">
              <span class="me-2">
                <img src="assets/Icone/google.png" alt="" height="25px">
              </span>
              Continua con Google
            </button>
          </div>

          <p class="text-center mt-4">
            Hai già un account?
            <a [routerLink]="['/login']" class="animated-underline">Accedi</a>
          </p>
        </form>
      </div>
    </div>

    <div class="col-md-6 d-none d-md-block animate-right" style="height: 100vh; position: relative;">
      <img src="assets/Presentazione/provaRegister.jpg" alt="Preview" class="w-100 h-100 object-fit-cover image-right"
        style="position: sticky; top: 0;">
    </div>

  </div>
</div>
